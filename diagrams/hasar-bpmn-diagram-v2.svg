  <rect x="942" y="128" width="162" height="154" rx="6" fill="#fff" stroke="#bbb" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="942" y="128" width="162" height="18" rx="6" fill="#e8e3d8"/>
  <rect x="942" y="138" width="162" height="8" fill="#e8e3d8"/>
  <text x="1023" y="140" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2c2c2c">UiPath OCR Servisi</text>
  <text x="952" y="160" font-size="7.5" fill="#555">• Fatura okuma</text>
  <text x="952" y="173" font-size="7.5" fill="#555">• Kimlik doğrulama</text>
  <text x="952" y="186" font-size="7.5" fill="#555">• Tutanak analizi</text>
  <text x="952" y="199" font-size="7.5" fill="#2c2c2c">• Evrak sınıflandırma ★</text>
  <text x="952" y="212" font-size="7" fill="#aaa">Otomatik veri çıkarımı</text>
  <text x="952" y="225" font-size="7" fill="#aaa">Eksik/hatalı evrak tespiti</text>
  <!-- fail drop -->
  <line x1="1023" y1="282" x2="1023" y2="330" stroke="#c0392b" stroke-width="1.1" marker-end="url(#arr-red)" class="ant-red"/>
  <text x="1029" y="310" font-size="7.5" fill="#c0392b">Evrak hatası</text>
  <rect x="942" y="330" width="162" height="52" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.1" filter="url(#sh)"/>
  <text x="1023" y="348" text-anchor="middle" font-size="8.5" fill="#c0392b" font-weight="bold">Uzman Atama</text>
  <text x="952" y="363" font-size="7.5" fill="#c0392b">Eksik/hatalı evrak bildirimi</text>
  <text x="952" y="375" font-size="7" fill="#aaa">Manuel kontrol gerekli</text>
  <!-- N6→N7 -->
  <line x1="1104" y1="200" x2="1136" y2="200" stroke="#27ae60" stroke-width="1.3" marker-end="url(#arr-green)" class="ant-green"/>
  <text x="1112" y="194" font-size="7.5" fill="#27ae60">Başarılı</text>

  <!-- ══ N7: Süreç Geçişi Kontrolü x=1136 w=162 cx=1217 ══ -->
  <rect x="1136" y="128" width="162" height="132" rx="6" fill="#fff" stroke="#bbb" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="1136" y="128" width="162" height="18" rx="6" fill="#e8e3d8"/>
  <rect x="1136" y="138" width="162" height="8" fill="#e8e3d8"/>
  <text x="1217" y="140" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2c2c2c">Süreç Geçiş Kontrolü</text>
  <text x="1146" y="160" font-size="7.5" fill="#555">Süreç tipi yeniden değerlenir</text>
  <text x="1146" y="173" font-size="7.5" fill="#2c2c2c">Az → Ağır geçiş mümkün ★</text>
  <text x="1146" y="186" font-size="7.5" fill="#555">Yeni evrak bilgisiyle karar</text>
  <text x="1146" y="199" font-size="7" fill="#aaa">BPM token güncellenir</text>
  <text x="1146" y="213" font-size="7" fill="#aaa">Uygun akışa yönlendirilir</text>
  <!-- N7→N8 -->
  <line x1="1298" y1="200" x2="1330" y2="200" stroke="#27ae60" stroke-width="1.3" marker-end="url(#arr-green)" class="ant-green"/>

  <!-- ══ N8: Ödeme Kararı x=1330 w=162 cx=1411 ══ -->
  <rect x="1330" y="128" width="162" height="132" rx="6" fill="#fff" stroke="#4ade80" stroke-width="1.2" filter="url(#sh)"/>
  <rect x="1330" y="128" width="162" height="18" rx="6" fill="#d5e8d4"/>
  <rect x="1330" y="138" width="162" height="8" fill="#d5e8d4"/>
  <text x="1411" y="140" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#2c2c2c">Ödeme Kararı</text>
  <text x="1340" y="160" font-size="7.5" fill="#555">Süreç tipine göre değerlenir</text>
  <text x="1340" y="173" font-size="7.5" fill="#27ae60">• Ödeme gerçekleşir</text>
  <text x="1340" y="186" font-size="7.5" fill="#c0392b">• Ödeme gerçekleşmez</text>
  <text x="1340" y="199" font-size="7" fill="#aaa">Onay akışı tamamlanır</text>
  <text x="1340" y="213" font-size="7" fill="#aaa">Core sisteme bildirim</text>
  <!-- N8→N9 -->
  <line x1="1492" y1="200" x2="1524" y2="200" stroke="#6b6b6b" stroke-width="1.3" marker-end="url(#arr)" class="ant-gray"/>

  <!-- ══ N9: Süreç Sonu x=1524 w=140 cx=1594 ══ -->
  <rect x="1524" y="168" width="140" height="64" rx="6" fill="#fff" stroke="#4ade80" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1594" y="191" text-anchor="middle" font-size="10" font-weight="bold" fill="#2c2c2c">Dosya Kapanışı</text>
  <text x="1594" y="205" text-anchor="middle" font-size="8" fill="#888">Core sisteme yazım</text>
  <text x="1594" y="218" text-anchor="middle" font-size="8" fill="#888">Süreç sonlandırılır</text>
  <!-- end circle indicator -->
  <circle cx="1655" cy="176" r="6" fill="none" stroke="#27ae60" stroke-width="2"/>
  <circle cx="1655" cy="176" r="3.5" fill="#27ae60"/>

  <!-- ══ UZMAN GERİ DÖNÜŞ OKLARI (alt bağlantı) ══ -->
  <!-- İş kuralı uzman → süreç yönlendirmeye geri -->
  <path d="M455,392 Q455,440 648,440 Q760,440 760,380" fill="none" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-orange)" class="ant-dashed"/>
  <text x="600" y="452" text-anchor="middle" font-size="7.5" fill="#e67e22">Uzman müdahalesi → Süreç yeniden başlar</text>

  <!-- Evrak hatası uzman → süreç geçiş kontrolüne geri -->
  <path d="M1023,382 Q1023,460 1217,460 Q1298,460 1298,260" fill="none" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-orange)" class="ant-dashed"/>

  <!-- ══ LEGEND ══ -->
  <line x1="40" y1="490" x2="1680" y2="490" stroke="#ddd" stroke-width="0.5"/>
  <rect x="460" y="500" width="12" height="12" rx="2" fill="#d5e8d4" stroke="#a8d5a2" stroke-width="0.8"/>
  <text x="478" y="511" font-size="8" fill="#666">Başarılı akış</text>
  <rect x="580" y="500" width="12" height="12" rx="2" fill="#fdecea" stroke="#e0a0a0" stroke-width="0.8"/>
  <text x="598" y="511" font-size="8" fill="#666">Hata / Uzman Atama</text>
  <rect x="730" y="500" width="12" height="12" rx="2" fill="#fff8e1" stroke="#f0c040" stroke-width="0.8"/>
  <text x="748" y="511" font-size="8" fill="#666">Koşullu yönlendirme</text>
  <rect x="900" y="500" width="12" height="12" rx="2" fill="#e8e3d8" stroke="#ccc" stroke-width="0.8"/>
  <text x="918" y="511" font-size="8" fill="#666">Süreç / İşlem adımı</text>
  <line x1="1060" y1="506" x2="1086" y2="506" stroke="#e67e22" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="1094" y="511" font-size="8" fill="#666">Geri dönüş / Süreç geçişi</text>
</svg>
