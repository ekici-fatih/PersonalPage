<svg viewBox="0 0 640 680" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans,sans-serif">
  <!-- Row 1: Müşteri Mesaj -->
  <rect x="270" y="15" width="100" height="40" rx="4" fill="#f0ebe3" stroke="#b5472a33" stroke-width="1.5"/>
  <text x="320" y="40" text-anchor="middle" fill="#6b6560" font-size="11">Müşteri Mesaj</text>
  <line x1="320" y1="55" x2="320" y2="95" stroke="#b5472a44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,95 315,85 325,85" fill="#b5472a44"/>
  
  <!-- Row 2: Intent Sınıflandırma -->
  <rect x="240" y="95" width="160" height="45" rx="4" fill="#e8e0d4" stroke="#b5472a66" stroke-width="1.5"/>
  <text x="320" y="122" text-anchor="middle" fill="#8b3520" font-size="11">Intent (AI) Sınıflandırma</text>
  <line x1="320" y1="140" x2="320" y2="180" stroke="#b5472a44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,180 315,170 325,170" fill="#b5472a44"/>
  
  <!-- Row 3: Elementer Servis -->
  <rect x="255" y="180" width="130" height="40" rx="4" fill="#e8e0d4" stroke="#b5472a66" stroke-width="1.5"/>
  <text x="320" y="205" text-anchor="middle" fill="#8b3520" font-size="11">Elementer Servis</text>
  <line x1="320" y1="220" x2="320" y2="260" stroke="#b5472a44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,260 315,250 325,250" fill="#b5472a44"/>
  
  <!-- Row 4: Login & Kullanıcı Tipi -->
  <rect x="265" y="260" width="110" height="35" rx="4" fill="#e8e0d4" stroke="#b5472a66" stroke-width="1.5"/>
  <text x="320" y="283" text-anchor="middle" fill="#8b3520" font-size="10">Login Akışı</text>
  <line x1="320" y1="295" x2="320" y2="325" stroke="#b5472a44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,325 315,315 325,315" fill="#b5472a44"/>
  
  <!-- Row 5: Decision - Kullanıcı Tipi -->
  <polygon points="320,325 370,355 320,385 270,355" fill="#fff9f0" stroke="#b5472a66" stroke-width="1.5"/>
  <text x="320" y="355" text-anchor="middle" fill="#8b3520" font-size="10">Kullanıcı</text>
  <text x="320" y="370" text-anchor="middle" fill="#8b3520" font-size="10">Tipi</text>
  
  <!-- Left: Sigortalı -->
  <line x1="270" y1="355" x2="120" y2="355" stroke="#b5472a33" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="120,350 130,355 120,360" fill="#b5472a33"/>
  <rect x="20" y="330" width="100" height="50" rx="4" fill="#f0ebe3" stroke="#b5472a33" stroke-width="1.5"/>
  <text x="70" y="355" text-anchor="middle" fill="#6b6560" font-size="10">Sigortalı</text>
  <text x="70" y="371" text-anchor="middle" fill="#b5472a" font-size="9">(Mevcut)</text>
  
  <!-- Right: Zaraf Gören -->
  <line x1="370" y1="355" x2="520" y2="355" stroke="#b5472a33" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="520,350 520,360 510,355" fill="#b5472a33"/>
  <rect x="520" y="330" width="100" height="50" rx="4" fill="#f0ebe3" stroke="#b5472a33" stroke-width="1.5"/>
  <text x="570" y="355" text-anchor="middle" fill="#6b6560" font-size="10">Zarar Gören</text>
  <text x="570" y="371" text-anchor="middle" fill="#b5472a" font-size="9">(★ Yeni)</text>
  
  <!-- Convergence -->
  <line x1="70" y1="380" x2="320" y2="410" stroke="#b5472a33" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="570" y1="380" x2="320" y2="410" stroke="#b5472a33" stroke-width="1.2" stroke-dasharray="4,3"/>
  
  <!-- Row 6: Poliçe Listeleme -->
  <rect x="240" y="410" width="160" height="40" rx="4" fill="#e8e0d4" stroke="#b5472a66" stroke-width="1.5"/>
  <text x="320" y="435" text-anchor="middle" fill="#8b3520" font-size="11">Poliçe Listeleme</text>
  <line x1="320" y1="450" x2="320" y2="480" stroke="#b5472a44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,480 315,470 325,470" fill="#b5472a44"/>
  
  <!-- Row 7: Decision - Sorgu Türü -->
  <polygon points="320,480 380,505 320,530 260,505" fill="#fff9f0" stroke="#b5472a66" stroke-width="1.5"/>
  <text x="320" y="505" text-anchor="middle" fill="#8b3520" font-size="10">Sorgu</text>
  <text x="320" y="520" text-anchor="middle" fill="#8b3520" font-size="10">Türü</text>
  
  <!-- Left: Poliçe Bilgisi -->
  <line x1="260" y1="505" x2="100" y2="505" stroke="#b5472a33" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="100,500 110,505 100,510" fill="#b5472a33"/>
  <rect x="20" y="485" width="80" height="40" rx="4" fill="#f0ebe3" stroke="#b5472a33" stroke-width="1.5"/>
  <text x="60" y="510" text-anchor="middle" fill="#6b6560" font-size="10">Poliçe</text>
  <text x="60" y="523" text-anchor="middle" fill="#6b6560" font-size="9">Bilgisi</text>
  
  <!-- Middle: Hasar -->
  <line x1="320" y1="530" x2="320" y2="565" stroke="#b5472a44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="320,565 315,555 325,555" fill="#b5472a44"/>
  <rect x="280" y="565" width="80" height="40" rx="4" fill="#f0ebe3" stroke="#b5472a33" stroke-width="1.5"/>
  <text x="320" y="590" text-anchor="middle" fill="#6b6560" font-size="10">Hasar</text>
  <text x="320" y="603" text-anchor="middle" fill="#6b6560" font-size="9">Sorgusu</text>
  
  <!-- Right: Provizyon -->
  <line x1="380" y1="505" x2="540" y2="505" stroke="#b5472a33" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="540,500 550,505 540,510" fill="#b5472a33"/>
  <rect x="540" y="485" width="80" height="40" rx="4" fill="#f0ebe3" stroke="#b5472a33" stroke-width="1.5"/>
  <text x="580" y="510" text-anchor="middle" fill="#6b6560" font-size="10">Provizyon</text>
  <text x="580" y="523" text-anchor="middle" fill="#6b6560" font-size="9">Sorgusu</text>
  
  <!-- Convergence to Final Answer -->
  <line x1="60" y1="525" x2="200" y2="630" stroke="#b5472a22" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="200,630 193,636 198,626" fill="#b5472a22"/>
  
  <line x1="320" y1="605" x2="320" y2="630" stroke="#b5472a22" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="320,630 315,620 325,620" fill="#b5472a22"/>
  
  <line x1="580" y1="525" x2="440" y2="630" stroke="#b5472a22" stroke-width="1.2" stroke-dasharray="4,3"/>
  <polygon points="440,630 442,620 448,628" fill="#b5472a22"/>
  
  <!-- Final: Cevap Metni -->
  <rect x="220" y="630" width="200" height="40" rx="4" fill="#e8e0d4" stroke="#b5472a77" stroke-width="1.5"/>
  <text x="320" y="657" text-anchor="middle" fill="#8b3520" font-size="11">Soruya Özel Cevap Metni</text>
</svg>