  <rect x="628" y="47" width="64" height="15" rx="7" fill="#eee" stroke="#ccc" stroke-width="0.7"/>
  <text x="660" y="58" text-anchor="middle" font-size="7" fill="#555">REST API</text>
  <rect x="698" y="47" width="62" height="15" rx="7" fill="#eee" stroke="#ccc" stroke-width="0.7"/>
  <text x="729" y="58" text-anchor="middle" font-size="7" fill="#555">3D Secure</text>
  <rect x="766" y="47" width="36" height="15" rx="7" fill="#eee" stroke="#ccc" stroke-width="0.7"/>
